<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="CampusCore — Unified campus resource manager with room allocation, GPU cluster access, and service boot sequencing." />
  <title>CampusCore — Campus Resource Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
</head>
<body>
  <div id="app">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect x="2" y="2" width="10" height="10" rx="2" fill="url(#g1)" />
              <rect x="16" y="2" width="10" height="10" rx="2" fill="url(#g2)" opacity="0.7" />
              <rect x="2" y="16" width="10" height="10" rx="2" fill="url(#g2)" opacity="0.7" />
              <rect x="16" y="16" width="10" height="10" rx="2" fill="url(#g1)" />
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="28" y2="28">
                  <stop stop-color="#6366f1" />
                  <stop offset="1" stop-color="#a855f7" />
                </linearGradient>
                <linearGradient id="g2" x1="0" y1="0" x2="28" y2="28">
                  <stop stop-color="#06b6d4" />
                  <stop offset="1" stop-color="#6366f1" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <div class="logo-text">
            <span class="logo-title">CampusCore</span>
            <span class="logo-subtitle">Resource Manager</span>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-section-title">Overview</span>
          <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            <span>Dashboard</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-title">Modules</span>
          <a href="#" class="nav-item" data-page="room-allocation" id="nav-room-allocation">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
            <span>Room Allocation</span>
            <span class="nav-badge badge-green">M1</span>
          </a>
          <a href="#" class="nav-item" data-page="gpu-cluster" id="nav-gpu-cluster">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="4" y="4" width="16" height="16" rx="2" />
              <rect x="9" y="9" width="6" height="6" />
              <line x1="9" y1="1" x2="9" y2="4" /><line x1="15" y1="1" x2="15" y2="4" />
              <line x1="9" y1="20" x2="9" y2="23" /><line x1="15" y1="20" x2="15" y2="23" />
              <line x1="20" y1="9" x2="23" y2="9" /><line x1="20" y1="14" x2="23" y2="14" />
              <line x1="1" y1="9" x2="4" y2="9" /><line x1="1" y1="14" x2="4" y2="14" />
            </svg>
            <span>GPU Cluster</span>
            <span class="nav-badge badge-purple">M2</span>
          </a>
          <a href="#" class="nav-item" data-page="service-boot" id="nav-service-boot">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="16 18 22 12 16 6" />
              <polyline points="8 6 2 12 8 18" />
            </svg>
            <span>Service Boot</span>
            <span class="nav-badge badge-cyan">M3</span>
          </a>
        </div>

        <div class="nav-section">
          <span class="nav-section-title">Reports</span>
          <a href="#" class="nav-item" data-page="analytics" id="nav-analytics">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="20" x2="18" y2="10" />
              <line x1="12" y1="20" x2="12" y2="4" />
              <line x1="6" y1="20" x2="6" y2="14" />
            </svg>
            <span>Analytics</span>
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="semester-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          <span>Semester: Fall 2026</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
      <!-- Top Bar -->
      <header class="topbar" id="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
            <line x1="3" y1="6" x2="21" y2="6" /><line x1="3" y1="12" x2="21" y2="12" /><line x1="3" y1="18" x2="21" y2="18" />
          </svg>
        </button>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-actions">
          <div class="status-indicator">
            <span class="status-dot online"></span>
            <span>System Online</span>
          </div>
          <button class="btn-icon" id="btn-run-all" title="Run All Modules">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
          </button>
        </div>
      </header>

      <!-- Page Container -->
      <div class="page-container" id="page-container">
        <!-- Pages are injected here by JS -->
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
